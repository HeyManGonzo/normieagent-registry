name = "normieagent-api"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Public read endpoints (GET /api/directory, GET /api/health) are exposed
# under the registry SPA's hostname so the frontend can call them
# same-origin. The /api/register and /api/routes/* write endpoints remain
# unreachable to the public until WALLET_FLOW_ENABLED is flipped in the
# frontend, but they're served by this worker either way.
[[routes]]
pattern = "registry.normieagent.com/api/*"
zone_name = "normieagent.com"

# Shared D1 + KV bindings — same database and namespace as the dispatch worker.
[[d1_databases]]
binding = "DB"
database_name = "normieagent"
database_id = "ad243149-dfb9-40a1-bf28-69759ab21ff1"

[[kv_namespaces]]
binding = "AGENT_ROUTES_KV"
id = "b16a5a6cadce4bc99e22896d8a297ecf"

[observability]
enabled = true

[vars]
ENVIRONMENT = "production"
# Allowed origins for CORS. Comma-separated. Override per-environment.
ALLOWED_ORIGINS = "https://registry.normieagent.com"
# Hybrid claim flow — pay-to-claim alternative to wallet-signing.
# Operator wallet receives the deposits; amount + TTL are tunable without
# a redeploy by editing here and re-running `wrangler deploy`.
OPERATOR_WALLET = "0x8Ed822f4300B8B95C9549F95Cb3e609d8DFA5D2D"
CLAIM_AMOUNT_WEI = "2000000000000000"
CLAIM_TTL_SECONDS = "86400"
# Base URL the verification email links point at. Override per-environment.
REGISTRY_BASE_URL = "https://registry.normieagent.com"

# Secrets (set via `wrangler secret put`, or workers/api/.dev.vars locally):
#   INFURA_API_KEY   — read by /api/register and /api/claim for ownerOf checks
#   RESEND_API_KEY   — read by /api/claim to send the verification email
