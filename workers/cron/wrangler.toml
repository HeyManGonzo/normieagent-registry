name = "normieagent-cron"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Cron worker is invoked only by the scheduled trigger below. No public URL
# is needed, so we shut off the auto-generated workers.dev hostname.
workers_dev = false
preview_urls = false

# Run every 5 minutes — Cloudflare's minimum scheduled granularity.
[triggers]
crons = ["*/5 * * * *"]

# Shared D1 + KV bindings — same database and namespace as the other workers.
[[d1_databases]]
binding = "DB"
database_name = "normieagent"
database_id = "ad243149-dfb9-40a1-bf28-69759ab21ff1"

[[kv_namespaces]]
binding = "AGENT_ROUTES_KV"
id = "b16a5a6cadce4bc99e22896d8a297ecf"

[observability]
enabled = true

[vars]
ENVIRONMENT = "production"
# Per-run block-range cap for the Transfer scanner. Keeps eth_getLogs requests
# under Infura's free-tier limits even after a long outage.
MAX_BLOCKS_PER_RUN = "2000"
# Hybrid claim flow — pay-to-claim watcher. Mirror these values to
# workers/api/wrangler.toml so the two workers agree on what a valid deposit
# looks like. INFURA_API_KEY + ETHERSCAN_API_KEY are secrets set via
# `wrangler secret put`; for local dev put both in workers/cron/.dev.vars.
OPERATOR_WALLET = "0x8Ed822f4300B8B95C9549F95Cb3e609d8DFA5D2D"
CLAIM_AMOUNT_WEI = "2000000000000000"
