name = "normieagent-dispatch"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# This worker is reached exclusively through the wildcard zone route below,
# never through workers.dev. Disabling the public preview URLs keeps the
# dispatch logic from being callable outside the normieagent.com domain.
workers_dev = false
preview_urls = false

# The wildcard route catches every subdomain of normieagent.com. The apex
# (normieagent.com) is NOT matched by this pattern and continues to resolve
# via the existing A record. Subdomains owned by other origins / workers
# (www → Vercel concierge site, registry → normieagent-registry SPA worker
# via Custom Domain) are also matched, but the dispatch worker re-issues
# those requests via fetch() — Cloudflare's same-URL loop suppression then
# routes them to the real owner. See PASSTHROUGH_HOSTS in src/index.ts.
[[routes]]
pattern = "*.normieagent.com/*"
zone_name = "normieagent.com"

# Bindings are populated after you create the D1 database and KV namespace.
# See README "Local dev runbook" for the exact wrangler commands.

[[d1_databases]]
binding = "DB"
database_name = "normieagent"
database_id = "ad243149-dfb9-40a1-bf28-69759ab21ff1"

[[kv_namespaces]]
binding = "AGENT_ROUTES_KV"
id = "b16a5a6cadce4bc99e22896d8a297ecf"

[observability]
enabled = true

[vars]
ENVIRONMENT = "production"
